services:
  app:
    # Test logs are disposable and must not persist customer-like fixture text.
    logging:
      driver: none
    # No auto-restart in test mode
    restart: "no"
    environment:
      # Isolated test DB — never touches prod bot-data volume
      SQLITE_PATH: /data/bot-test.sqlite
      STARTUP_DIAGNOSTICS_ENABLED: "false"
    volumes:
      - bot-data-test:/data

  cloudflared:
    # Disable tunnel in test mode (use npm run start:tunnel locally if needed)
    profiles:
      - disabled

volumes:
  bot-data-test:
